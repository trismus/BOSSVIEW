# SKYNEX — Development Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: ["sh", "-c", "npx tsx src/seed.ts 2>/dev/null; npx tsx watch src/index.ts"]
    volumes:
      - ./backend/src:/app/src
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "3000"]
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      # Hot-mount config files so Tailwind/Vite/TS changes don't need an
      # image rebuild. package.json intentionally stays baked because dep
      # changes need a fresh npm install anyway.
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      - NODE_ENV=development
    ports:
      - "3000:3000"

  connector-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: ["npx", "tsx", "watch", "src/connectors/engine.ts"]
    volumes:
      - ./backend/src:/app/src

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
