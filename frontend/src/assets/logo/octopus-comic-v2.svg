  <ellipse cx="408" cy="375" rx="4.5" ry="3.5" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="435" cy="370" rx="4" ry="3" fill="none" stroke="black" stroke-width="1.5"/>

