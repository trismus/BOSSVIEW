# SKYNEX — Docker Compose Base Configuration
# Usage:
#   Development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Run from repo root (where this file lives)

version: "3.9"

services:

  # ============================================
  # NGINX — Reverse Proxy & TLS Termination
  # ============================================
  nginx:
    image: nginx:1.27-alpine
    container_name: skynex-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - skynex-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # FRONTEND — React SPA
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skynex-frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - VITE_API_URL=${API_URL:-/api/v1}
      - VITE_WS_URL=${WS_URL:-/ws}
    networks:
      - skynex-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================
  # API — Express.js REST API + WebSocket
  # ============================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skynex-api
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-15m}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skynex-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ============================================
  # CONNECTOR ENGINE — Background Sync Worker
  # ============================================
  connector-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skynex-connector-engine
    restart: unless-stopped
    command: ["node", "dist/connectors/engine.js"]
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - CONNECTOR_POLL_INTERVAL=${CONNECTOR_POLL_INTERVAL:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skynex-network
    security_opt:
      - no-new-privileges:true

  # ============================================
  # REDIS — Queue, Cache, Session Store, Pub/Sub
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: skynex-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - skynex-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ============================================
  # POSTGRESQL — Primary Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: skynex-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bossview}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-bossview}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - skynex-network
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bossview} -d ${POSTGRES_DB:-bossview}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

# ============================================
# NETWORKS
# ============================================
networks:
  skynex-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
